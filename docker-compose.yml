# ─────────────────────────────────────────────────────────────
#  Awais Portfolio — standalone web container
#
#  Independent from Syed Tech (port 786 / Caddy 80/443):
#    web  — nginx on :274, published publicly on host :274
#
#  Syed Tech is untouched. No shared Docker network or Caddy import.
#  Public URL: http://YOUR_VPS_IP:274  (or Cloudflare Tunnel → :274)
#
#  CI writes .env from GitHub Secrets; manual: cp .env.example .env
# ─────────────────────────────────────────────────────────────
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-awais-portfolio/web:latest}
    container_name: ${WEB_CONTAINER_NAME:-awais-portfolio-web}
    restart: unless-stopped

    ports:
      - "${WEB_PORT:-274}:${WEB_PORT:-274}"

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${WEB_PORT:-274}/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
