# ─────────────────────────────────────────────────────────────
#  Awais Portfolio — web container only
#
#  Matches the shared-VPS pattern used by your other site:
#    web  — nginx on :274, bound to 127.0.0.1:274 on the host
#           also reachable as awais-portfolio-web:274 on the proxy network
#
#  The existing Caddy instance (ports 80/443) routes your domain here.
#  See deploy/Caddyfile.snippet for the block to add on the main site.
#
#  CI writes .env from GitHub Secrets; manual: cp .env.example .env
# ─────────────────────────────────────────────────────────────
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-awais-portfolio/web:latest}
    container_name: ${WEB_CONTAINER_NAME:-awais-portfolio-web}
    restart: unless-stopped

    ports:
      - "127.0.0.1:${WEB_PORT:-274}:${WEB_PORT:-274}"

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${WEB_PORT:-274}/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - default
      - proxy

networks:
  default:
  proxy:
    external: true
    name: ${DOCKER_NETWORK}
