# ─────────────────────────────────────────────────────────────
#  Awais Portfolio — web container behind the shared central Caddy
#
#  Public TLS + routing is handled by the central Caddy (/opt/caddy),
#  which reaches this container as `awais-portfolio-web:274` over the
#  shared external `proxy` Docker network. The host port is bound to
#  loopback only (local debug); the public never hits :274 directly.
#
#  VPS prerequisites (one time):
#    docker network create proxy
#    cp deploy/awaisdesigner.caddy /opt/caddy/conf.d/    # then reload Caddy
#    docker exec caddy caddy reload --config /etc/caddy/Caddyfile
#
#  DNS: awaisdesigner.com + www  →  A record to the VPS IP, "DNS only".
#
#  CI writes .env from GitHub Secrets; manual: cp .env.example .env
# ─────────────────────────────────────────────────────────────
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-awais-portfolio/web:latest}
    container_name: ${WEB_CONTAINER_NAME:-awais-portfolio-web}
    restart: unless-stopped

    # Loopback-only host port for local debugging. Public traffic arrives
    # through the central Caddy over the `proxy` network, not this port.
    ports:
      - "127.0.0.1:${WEB_PORT:-274}:${WEB_PORT:-274}"

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${WEB_PORT:-274}/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - proxy

networks:
  # Shared with the central Caddy. Create once on the VPS:
  #   docker network create proxy
  proxy:
    external: true
